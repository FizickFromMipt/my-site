<!DOCTYPE HTML>
<html>
<head>
  <title>Article</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="detail-page">
  <div id="wrapper">
    <header>
      <h1 id="title"></h1>
    </header>

    <section id="details">
      <img id="cover" alt="" style="display:none" />
      <div id="content"></div>
    </section>

    <footer>
      <a href="index.html" class="button">&larr; Back</a>
    </footer>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/blocks-renderer.js"></script>
  <script>
    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      if (!slug) {
        document.getElementById("title").textContent = "Article not found";
        return;
      }

      try {
        // Try by slug first, then by documentId
        let res = await fetch(
          `${API_BASE_URL}/api/blogs?filters[slug][$eq]=${encodeURIComponent(slug)}&populate=cover`
        );
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);

        let data = await res.json();

        if (!data.data || data.data.length === 0) {
          res = await fetch(
            `${API_BASE_URL}/api/blogs/${encodeURIComponent(slug)}?populate=cover`
          );
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          data = await res.json();
          data = { data: data.data ? [data.data] : [] };
        }

        if (!data.data || data.data.length === 0) {
          document.getElementById("title").textContent = "Article not found";
          return;
        }

        const article = data.data[0];

        document.getElementById("title").textContent = article.title || "";

        const coverEl = document.getElementById("cover");
        if (article.cover?.url) {
          coverEl.src = article.cover.url.startsWith("http")
            ? article.cover.url
            : `${API_BASE_URL}${article.cover.url}`;
          coverEl.alt = article.title || "";
          coverEl.style.display = "";
        }

        document.getElementById("content").innerHTML = renderBlocks(article.content);
      } catch (err) {
        console.error("Ошибка загрузки статьи:", err);
        document.getElementById("title").textContent = "Failed to load article";
      }
    }

    document.addEventListener("DOMContentLoaded", loadArticle);
  </script>
</body>
</html>
